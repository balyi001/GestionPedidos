{% extends 'core/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h5>{% if producto %}Editar Producto{% else %}Nuevo Producto{% endif %}</h5>
            </div>
            <div class="card-body">
                <form id="formProd" method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label>Nombre del Producto</label>
                        <input type="text" name="nombre" class="form-control" value="{{ producto.nombre|default:'' }}" required>
                    </div>
                    <div class="mb-3">
                        <label>Precio</label>
                        <input type="number" name="precio" class="form-control" value="{{ producto.precio|default:'' }}" required>
                    </div>
                    <div class="mb-3">
                        <label>Stock</label>
                        <input type="number" name="stock" class="form-control" value="{{ producto.stock|default:'' }}" required>
                    </div>
                    <button type="button" onclick="confirmarProd()" class="btn btn-success w-100">Guardar</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function confirmarProd() {
    Swal.fire({
        title: '¿Realmente desea guardar este producto?',
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'Sí, guardar'
    }).then((result) => {
        if (result.isConfirmed) { document.getElementById('formProd').submit(); }
    })
}
</script>
{% endblock %}
