<!DOCTYPE html>
<html>
<head>
    <style>
        h1 { text-align: center; color: #39a900; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #000; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Reporte Detallado de Pedidos</h1>
    <table>
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Cliente</th>
                <th>Producto</th>
                <th>Cant</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody>
            {% for p in pedidos %}
            {% for d in p.detalles.all %}
            <tr>
                <td>{{ p.fecha|date:"d/m/Y" }}</td>
                <td>{{ p.cliente.nombre }}</td>
                <td>{{ d.producto.nombre }}</td>
                <td>{{ d.cantidad }}</td>
                <td>${{ d.subtotal }}</td>
            </tr>
            {% endfor %}
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
