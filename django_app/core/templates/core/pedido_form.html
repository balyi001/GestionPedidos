{% extends 'core/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8"> <div class="card shadow border-0">
            <div class="card-header bg-primary text-white py-3">
                <h5 class="mb-0">{% if pedido %}Modificar Pedido #{{ pedido.id }}{% else %}🛒 Nuevo Pedido{% endif %}</h5>
            </div>
            <div class="card-body p-4">
                <form id="formAccion" method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Cliente</label>
                        <select name="cliente" class="form-select" required>
                            <option value="">Seleccione un cliente</option>
                            {% for c in clientes %}
                            <option value="{{ c.id }}" {% if pedido.cliente.id == c.id %}selected{% endif %}>{{ c.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold d-flex justify-content-between">
                            Productos del Pedido
                            <button type="button" id="add-product" class="btn btn-sm btn-success">+ Añadir otro producto</button>
                        </label>
                        
                        <div id="productos-container">
                            {% if pedido %}
                                {% for det in pedido.detalles.all %}
                                <div class="row g-2 mb-2 producto-fila">
                                    <div class="col-md-7">
                                        <select name="producto[]" class="form-select" required>
                                            {% for p in productos %}
                                            <option value="{{ p.id }}" {% if det.producto.id == p.id %}selected{% endif %}>
                                                {{ p.nombre }} (Stock: {{ p.stock }})
                                            </option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <input type="number" name="cantidad[]" class="form-control" value="{{ det.cantidad }}" min="1" required>
                                    </div>
                                    <div class="col-md-2">
                                        <button type="button" class="btn btn-outline-danger w-100 btn-remove">×</button>
                                    </div>
                                </div>
                                {% endfor %}
                            {% else %}
                                <div class="row g-2 mb-2 producto-fila">
                                    <div class="col-md-7">
                                        <select name="producto[]" class="form-select" required>
                                            <option value="">Seleccione producto</option>
                                            {% for p in productos %}
                                            <option value="{{ p.id }}">{{ p.nombre }} (Stock: {{ p.stock }})</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                    <div class="col-md-3">
                                        <input type="number" name="cantidad[]" class="form-control" placeholder="Cant." min="1" required>
                                    </div>
                                    <div class="col-md-2">
                                        <button type="button" class="btn btn-outline-danger w-100 btn-remove" style="display:none;">×</button>
                                    </div>
                                </div>
                            {% endif %}
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Estado del Envío</label>
                        <select name="estado" class="form-select">
                            <option value="Pendiente" {% if pedido.estado == 'Pendiente' %}selected{% endif %}>Pendiente</option>
                            <option value="Enviado" {% if pedido.estado == 'Enviado' %}selected{% endif %}>Enviado</option>
                            <option value="Entregado" {% if pedido.estado == 'Entregado' %}selected{% endif %}>Entregado</option>
                            {% if pedido %}
                            <option value="Cancelado" {% if pedido.estado == 'Cancelado' %}selected{% endif %} class="text-danger fw-bold">Cancelado</option>
                            {% endif %}
                        </select>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="button" onclick="confirmarSubmit('¿Desea procesar este pedido?')" class="btn {% if pedido %}btn-warning{% else %}btn-primary{% endif %} shadow-sm">
                            {% if pedido %}Actualizar Pedido{% else %}Confirmar Pedido{% endif %}
                        </button>
                        <a href="{% url 'listar_pedidos' %}" class="btn btn-light border">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// Lógica para añadir filas
document.getElementById('add-product').addEventListener('click', function() {
    const container = document.getElementById('productos-container');
    const rows = container.querySelectorAll('.producto-fila');
    const newRow = rows[0].cloneNode(true);
    
    // Limpiar campos
    const select = newRow.querySelector('select');
    const input = newRow.querySelector('input');
    select.value = "";
    input.value = "";
    
    // Mostrar botón eliminar
    const removeBtn = newRow.querySelector('.btn-remove');
    removeBtn.style.display = 'block';
    removeBtn.onclick = function() { newRow.remove(); };
    
    container.appendChild(newRow);
});

// Lógica para botones eliminar existentes (en edición)
document.querySelectorAll('.btn-remove').forEach(btn => {
    btn.onclick = function() { btn.closest('.producto-fila').remove(); };
});

function confirmarSubmit(mensaje) {
    Swal.fire({
        title: mensaje,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'Sí, proceder',
        cancelButtonText: 'Cancelar'
    }).then((result) => {
        if (result.isConfirmed) {
            document.getElementById('formAccion').submit();
        }
    })
}
</script>
{% endblock %}
